name: Release to npm

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    # Prevent a loop when the workflow pushes the release commit.
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.AGENT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test -- --passWithNoTests

      - name: Compile skills
        run: npm run compile

      - name: Validate skill compilation
        run: npm run compile:validate

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch tags
        run: |
          git fetch --tags --force

      - name: Bump to next available patch version
        run: |
          BASE_VERSION="$(node -p "require('./package.json').version")"
          NEXT_VERSION="$(node -e "const v='${BASE_VERSION}'.split('.').map(Number); v[2] += 1; console.log(v.join('.'));")"

          while git rev-parse -q --verify "refs/tags/v${NEXT_VERSION}" >/dev/null; do
            NEXT_VERSION="$(node -e "const v='${NEXT_VERSION}'.split('.').map(Number); v[2] += 1; console.log(v.join('.'));")"
          done

          npm version "${NEXT_VERSION}" -m "chore(release): %s [skip ci]"

      - name: Push release commit and tag
        run: git push --follow-tags

      - name: Publish package to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
